<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rovex Racing | Performance & Media</title>
    <!-- Library CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; margin: 0; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        .italic-black { font-style: italic; font-weight: 900; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Helper untuk memanggil icon Lucide secara dinamis di browser
        // Memperbaiki error: window.lucide.icons[name].toSvg is not a function
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // Konversi nama PascalCase (React) ke kebab-case (Lucide CDN)
                    // Contoh: ShieldCheck -> shield-check
                    const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    
                    // Bersihkan konten lama dan masukkan tag i untuk Lucide
                    iconRef.current.innerHTML = `<i data-lucide="${lucideName}"></i>`;
                    
                    // Render ikon menggunakan createIcons
                    window.lucide.createIcons({
                        root: iconRef.current
                    });

                    // Terapkan class Tailwind ke SVG yang dihasilkan
                    const svg = iconRef.current.querySelector('svg');
                    if (svg && className) {
                        className.split(' ').forEach(cls => {
                            if (cls) svg.classList.add(cls);
                        });
                    }
                }
            }, [name, className]);

            return <span ref={iconRef} className="inline-flex items-center" />;
        };

        const RovexBrandPage = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen text-zinc-100 selection:bg-red-600 selection:text-white">
                    {/* Navigasi */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/90 backdrop-blur-xl py-4 border-b border-white/5' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                {/* Logo yang diupload ke Repo */}
                                <img 
                                    src="rovex.png" 
                                    alt="Rovex Logo" 
                                    className="h-10 w-10 object-contain"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'flex';
                                    }}
                                />
                                {/* Fallback jika logo gagal dimuat */}
                                <div className="hidden h-10 w-10 bg-red-600 items-center justify-center rounded-sm font-black italic text-black text-xl italic-black">RX</div>
                                <span className="text-xl font-bold tracking-[0.4em] uppercase">Rovex</span>
                            </div>
                            
                            <div className="hidden md:flex space-x-8 items-center text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400">
                                <a href="#soul" className="hover:text-red-600 transition-colors uppercase">The Soul</a>
                                <a href="#divisions" className="hover:text-red-600 transition-colors uppercase">Divisions</a>
                                <a href="#broadcast" className="hover:text-red-600 transition-colors uppercase">Broadcast</a>
                                <a href="#team" className="hover:text-red-600 transition-colors uppercase">The Family</a>
                                <div className="h-4 w-px bg-zinc-800"></div>
                                <a href="https://instagram.com/rovex.racing" target="_blank" className="flex items-center gap-2 hover:text-white transition-colors uppercase">
                                    <Icon name="Instagram" className="w-3 h-3" /> Instagram
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}

                                        <div className="space-y-1">

                        </div>
                    </section>
