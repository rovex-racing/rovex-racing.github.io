<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rovex Racing | Performance & Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; margin: 0; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        .italic-black { font-style: italic; font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.innerHTML = `<i data-lucide="${lucideName}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                    const svg = iconRef.current.querySelector('svg');
                    if (svg && className) {
                        className.split(' ').forEach(cls => { if (cls) svg.classList.add(cls); });
                    }
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center" />;
        };

        const RovexBrandPage = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen text-zinc-100 selection:bg-red-600 selection:text-white bg-[#050505]">
                    {/* Navigation Revisi dengan Icon Instagram */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/90 backdrop-blur-xl py-4 border-b border-white/5' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                <img src="rovex.png" alt="Logo" className="h-10 w-10 object-contain" />
                                <span className="text-xl font-bold tracking-[0.4em] uppercase">Rovex</span>
                            </div>
                            <div className="hidden md:flex space-x-8 items-center text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400">
                                <a href="#soul" className="hover:text-red-600 transition-colors">The Soul</a>
                                <a href="#divisions" className="hover:text-red-600 transition-colors">Divisions</a>
                                <a href="#broadcast" className="hover:text-red-600 transition-colors">Broadcast</a>
                                <a href="#team" className="hover:text-red-600 transition-colors">The Family</a>
                                <div className="h-4 w-px bg-zinc-800"></div>
                                <a href="https://instagram.com/rovex.racing" target="_blank" className="flex items-center gap-2 hover:text-white transition-colors">
                                    <Icon name="Instagram" className="w-3 h-3" /> INSTAGRAM
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section dengan revisi RACING agar tidak kepotong */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(185,28,28,0.12)_0%,_transparent_70%)]" />
                        <div className="relative z-10 text-center space-y-8 px-6">
                            <div className="inline-flex items-center space-x-3 px-4 py-1.5 bg-zinc-900/50 border border-zinc-800 rounded-full">
                                <span className="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse" />
                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-400">German Racing Heritage</span>
                            </div>
                            
                            <h1 className="text-6xl md:text-8xl lg:text-[9rem] italic-black uppercase tracking-tight leading-[0.9] italic inline-block w-full text-center pr-[0.2em]">
                                ROVEX <br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-b from-red-600 to-red-900 pr-4">
                                    RACING
                                </span>
                            </h1>

                            <p className="max-w-xl mx-auto text-zinc-500 text-lg md:text-xl font-light">
                                Beyond the grid. Where real-world racing instinct meets the digital stage.
                            </p>
                            <div className="flex justify-center pt-4">
                                <a href="#divisions" className="bg-red-600 px-10 py-4 text-black font-black uppercase tracking-widest text-xs italic-black hover:bg-red-700 transition-all">
                                    Explore Our Ecosystem
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Section Soul, Divisions, Broadcast, Team tetap aman di sini */}
                    <section id="soul" className="py-32 bg-[#080808] border-y border-white/5">
                        <div className="max-w-7xl mx-auto px-8 grid md:grid-cols-2 gap-20 items-center">
                            <div className="space-y-8">
                                <div className="space-y-4">
                                    <h2 className="text-red-600 font-bold uppercase tracking-[0.3em] text-xs">The Soul of the Brand</h2>
                                    <h3 className="text-4xl md:text-5xl italic-black uppercase italic leading-[1.1]">When the Body says STOP, the Heart Races on.</h3>
                                </div>
                                <p className="text-zinc-400 text-lg font-light leading-relaxed">
                                    After completing his last professional race in 2013, Roy Struck didn't hang up his helmet—he redefined the arena.
                                </p>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RovexBrandPage />);
    </script>
</body>
</html>
