<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rovex Racing | Performance & Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; margin: 0; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Helper untuk render Icon Lucide
        const Icon = ({ name, className }) => {
            const [iconHtml, setIconHtml] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) setIconHtml(icon.toSvg({ class: className }));
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} className="inline-flex items-center" />;
        };

        const RovexBrandPage = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-[#050505] text-zinc-100 font-sans selection:bg-red-600 selection:text-white">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/80 backdrop-blur-xl py-4 border-b border-white/5' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                {/* Brand Icon Uploaded to Repo */}
                                <img 
                                    src="https://rovex-racing.github.io/rovex.png" 
                                    alt="Rovex Logo" 
                                    className="h-10 w-10 object-contain"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'flex';
                                    }}
                                />
                                {/* Fallback Icon if Image fails */}
                                <div className="hidden h-10 w-10 bg-red-600 items-center justify-center rounded-sm font-black italic text-black text-xl">RX</div>
                                <span className="text-xl font-bold tracking-[0.4em] uppercase">Rovex</span>
                            </div>
                            
                            <div className="hidden md:flex space-x-8 items-center text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400">
                                <a href="#soul" className="hover:text-red-600 transition-colors">The Soul</a>
                                <a href="#divisions" className="hover:text-red-600 transition-colors">Divisions</a>
                                <a href="#broadcast" className="hover:text-red-600 transition-colors">Broadcast</a>
                                <a href="#team" className="hover:text-red-600 transition-colors">The Family</a>
                                <div className="h-4 w-px bg-zinc-800"></div>
                                <a href="https://instagram.com/rovex.racing" target="_blank" className="flex items-center gap-2 hover:text-white transition-colors">
                                    <Icon name="Instagram" className="w-3 h-3" /> Instagram
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(185,28,28,0.08)_0%,_transparent_70%)]" />
                        <div className="absolute -bottom-24 -left-24 w-96 h-96 bg-red-900/10 rounded-full blur-[120px]" />
                        
                        <div className="relative z-10 text-center space-y-8 px-6">
                            <div className="inline-flex items-center space-x-3 px-4 py-1.5 bg-zinc-900/50 border border-zinc-800 rounded-full backdrop-blur-sm">
                                <span className="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse" />
                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-400">German Racing Heritage</span>
                            </div>
                            
                            <h1 className="text-7xl md:text-9xl font-black uppercase tracking-tighter leading-none italic">
                                ROVEX <br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-b from-red-600 to-red-900">RACING</span>
                            </h1>
                            
                            <p className="max-w-xl mx-auto text-zinc-500 text-lg md:text-xl font-light leading-relaxed">
                                Beyond the grid. Where real-world racing instinct meets the digital stage. 
                                <span className="block italic text-zinc-400 mt-2 font-medium">Built on passion, not trophies.</span>
                            </p>

                            <div className="flex flex-col md:flex-row items-center justify-center gap-4 pt-4">
                                <a href="#divisions" className="group relative px-10 py-4 bg-red-600 overflow-hidden transition-all hover:bg-red-700">
                                    <div className="relative z-10 flex items-center gap-2 text-black font-black uppercase tracking-widest text-xs">
                                        Explore Our Ecosystem <Icon name="ChevronRight" className="w-4 h-4" />
                                    </div>
                                </a>
                                <div className="text-[10px] text-zinc-600 uppercase tracking-widest font-bold">Est. 2013 | Founded by Roy Struck</div>
                            </div>
                        </div>

                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-30">
                            <div className="w-px h-12 bg-gradient-to-b from-red-600 to-transparent"></div>
                        </div>
                    </section>

                    {/* The Soul */}
                    <section id="soul" className="py-32 bg-[#080808] border-y border-white/5 relative overflow-hidden">
                        <div className="max-w-7xl mx-auto px-8 grid md:grid-cols-2 gap-20 items-center">
                            <div className="space-y-8">
                                <div className="space-y-4">
                                    <h2 className="text-red-600 font-bold uppercase tracking-[0.3em] text-xs">The Soul of the Brand</h2>
                                    <h3 className="text-4xl md:text-5xl font-black uppercase italic leading-[1.1]">When the Body says STOP, the Heart Races on.</h3>
                                </div>
                                
                                <div className="space-y-6 text-zinc-400 leading-relaxed text-lg font-light">
                                    <p>
                                        After completing his last professional race in 2013, Roy Struck didn't hang up his helmet—he redefined the arena. 
                                    </p>
                                    <p>
                                        Derived from a fusion of personal legacy and strategic precision, the name <span className="text-white font-bold">ROVEX</span> was crafted to evoke a sense of timeless authority. It is a phonetic tribute to the standards we uphold: <span className="text-white italic">Precision, Class, and Unwavering Quality.</span>
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                                    <div className="p-6 bg-zinc-900/30 border border-zinc-800 hover:border-red-600/30 transition-colors">
                                        <Icon name="ShieldCheck" className="w-5 h-5 text-red-600 mb-4" />
                                        <h4 className="font-bold uppercase tracking-widest text-sm mb-2 text-zinc-200">Integrity First</h4>
                                        <p className="text-xs text-zinc-500">We don't chase fame. We stay grounded, focusing on the community and the craft.</p>
                                    </div>
                                    <div className="p-6 bg-zinc-900/30 border border-zinc-800 hover:border-red-600/30 transition-colors">
                                        <Icon name="Activity" className="w-5 h-5 text-red-600 mb-4" />
                                        <h4 className="font-bold uppercase tracking-widest text-sm mb-2 text-zinc-200">The Edge</h4>
                                        <p className="text-xs text-zinc-500">Professional racing instincts applied to every wheel input and commentary session.</p>
                                    </div>
                                </div>
                            </div>

                            <div className="relative group">
                                <div className="absolute -inset-1 bg-gradient-to-r from-red-600/20 to-transparent blur opacity-30 group-hover:opacity-50 transition-opacity"></div>
                                <div className="relative bg-zinc-950 border border-white/10 aspect-video flex flex-col justify-center items-center p-12 text-center overflow-hidden">
                                    <div className="text-[14vw] font-black italic text-white/[0.03] absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 select-none">
                                        QUALITY
                                    </div>
                                    <div className="relative z-10">
                                        <div className="text-6xl font-black italic tracking-tighter text-white mb-2">ROVEX</div>
                                        <div className="h-1 w-12 bg-red-600 mx-auto mb-6"></div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] uppercase tracking-[0.5em] font-bold text-zinc-500">Est. Germany 2013</p>
                                            <p className="text-[10px] uppercase tracking-[0.5em] font-bold text-red-600">Pure Legacy</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Ecosystem Section */}
                    <section id="divisions" className="py-32 relative border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-8">
                            <div className="text-center mb-20 space-y-4">
                                <h2 className="text-red-600 font-bold uppercase tracking-[0.4em] text-[10px]">The Ecosystem</h2>
                                <h3 className="text-4xl font-black uppercase italic tracking-tighter">Dual Pillars of Excellence</h3>
                            </div>

                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="group relative p-12 bg-zinc-900/40 border border-zinc-800/50 hover:border-red-600/50 transition-all duration-500 overflow-hidden">
                                    <div className="absolute -right-8 -top-8 opacity-[0.03] group-hover:opacity-[0.07] transition-opacity">
                                        <Icon name="Trophy" className="w-48 h-48" />
                                    </div>
                                    <div className="relative z-10">
                                        <Icon name="Target" className="w-10 h-10 text-red-600 mb-8" />
                                        <h4 className="text-xs font-bold uppercase tracking-[0.3em] text-zinc-500 mb-2 italic">Competitive DNA</h4>
                                        <h5 className="text-3xl font-black uppercase italic mb-6">Rovex Racing</h5>
                                        <p className="text-zinc-500 text-sm leading-relaxed mb-8 max-w-sm">
                                            Our foundation on the track. Representing elite competition, professional driver rosters, and data-driven racing performance.
                                        </p>
                                        <div className="space-y-3">
                                            {['Pro Driver Roster', 'Endurance Specialists', 'Telemetry Analysis'].map((item, i) => (
                                                <div key={i} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-zinc-400">
                                                    <div className="w-1 h-1 bg-red-600"></div> {item}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="group relative p-12 bg-zinc-900/40 border border-zinc-800/50 hover:border-red-600/50 transition-all duration-500 overflow-hidden">
                                    <div className="absolute -right-8 -top-8 opacity-[0.03] group-hover:opacity-[0.07] transition-opacity">
                                        <Icon name="Radio" className="w-48 h-48" />
                                    </div>
                                    <div className="relative z-10">
                                        <Icon name="Zap" className="w-10 h-10 text-red-600 mb-8" />
                                        <h4 className="text-xs font-bold uppercase tracking-[0.3em] text-zinc-500 mb-2 italic">Media Production</h4>
                                        <h5 className="text-3xl font-black uppercase italic mb-6">Rovex Entertainment</h5>
                                        <p className="text-zinc-500 text-sm leading-relaxed mb-8 max-w-sm">
                                            The commentary standard. Turning races into global spectacles for organizations like ADAC and Scherer.
                                        </p>
                                        <a href="#broadcast" className="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-red-600 hover:text-white transition-colors">
                                            View Broadcast Details <Icon name="ChevronRight" className="w-3 h-3" />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Broadcast Section */}
                    <section id="broadcast" className="py-32 relative bg-[#050505]">
                        <div className="max-w-7xl mx-auto px-8">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                                <div className="space-y-4">
                                    <h2 className="text-red-600 font-bold uppercase tracking-[0.3em] text-xs">Rovex Entertainment</h2>
                                    <h3 className="text-4xl md:text-5xl font-black uppercase italic tracking-tighter">The Commentary Standard</h3>
                                </div>
                                <div className="max-w-sm">
                                    <p className="text-zinc-500 text-sm italic border-l border-zinc-800 pl-6">
                                        "Roy understands every wheel input. His professional background allows for commentary that explains the 'why' behind every move."
                                    </p>
                                </div>
                            </div>

                            <div className="grid md:grid-cols-3 gap-8">
                                <div className="group p-10 bg-zinc-900/40 border border-zinc-800/50 hover:border-red-600/50 transition-all duration-500">
                                    <Icon name="Radio" className="w-8 h-8 text-red-600 mb-8" />
                                    <h4 className="text-lg font-bold uppercase tracking-wider mb-4">Live Broadcasting</h4>
                                    <p className="text-zinc-500 text-sm leading-relaxed mb-8">Full-scale broadcast management for YouTube and Twitch. Energetic, analytical, and professional.</p>
                                    <div className="flex items-center gap-3 text-[10px] font-bold text-zinc-600 uppercase tracking-widest pt-4 border-t border-zinc-800/50">
                                        <Icon name="Play" className="w-3 h-3 fill-current text-red-600" /> 1-2 Events Per Week
                                    </div>
                                </div>

                                <div className="group p-10 bg-zinc-900/40 border border-zinc-800/50 hover:border-red-600/50 transition-all duration-500">
                                    <Icon name="Users" className="w-8 h-8 text-red-600 mb-8" />
                                    <h4 className="text-lg font-bold uppercase tracking-wider mb-4">Talent Scouting</h4>
                                    <p className="text-zinc-500 text-sm leading-relaxed mb-8">Using professional eyes to spot the next generation of simracing talent.</p>
                                    <div className="flex items-center gap-3 text-[10px] font-bold text-zinc-600 uppercase tracking-widest pt-4 border-t border-zinc-800/50">
                                        <div className="w-1.5 h-1.5 bg-red-600 rounded-full" /> Active Community Hub
                                    </div>
                                </div>

                                <div className="group p-10 bg-zinc-900/40 border border-zinc-800/50 hover:border-red-600/50 transition-all duration-500">
                                    <Icon name="Clock" className="w-8 h-8 text-red-600 mb-8" />
                                    <h4 className="text-lg font-bold uppercase tracking-wider mb-4">German Precision</h4>
                                    <p className="text-zinc-500 text-sm leading-relaxed mb-8">Based in Germany, broadcasting in English to reach the global simracing elite.</p>
                                    <div className="flex items-center gap-3 text-[10px] font-bold text-zinc-600 uppercase tracking-widest pt-4 border-t border-zinc-800/50">
                                        <div className="w-1.5 h-1.5 bg-red-600 rounded-full" /> Global Reach
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Team Section */}
                    <section id="team" className="py-32 bg-[#030303]">
                        <div className="max-w-7xl mx-auto px-8 text-center mb-20 space-y-4">
                            <h2 className="text-red-600 font-bold uppercase tracking-[0.4em] text-[10px]">The Active Squad</h2>
                            <h3 className="text-4xl font-black uppercase italic tracking-tighter">Rovex Racing Family</h3>
                        </div>
                        <div className="max-w-7xl mx-auto px-8 grid grid-cols-2 md:grid-cols-4 gap-4">
                            {[
                                { name: 'Roy Struck', role: 'Founder / Ex-Pro' },
                                { name: 'Mikel Thienes', role: 'Driver' },
                                { name: 'Gabriel Schmitz', role: 'Driver' },
                                { name: 'Arne', role: 'Driver' }
                            ].map((driver, idx) => (
                                <div key={idx} className="bg-zinc-900/20 border border-white/5 p-12 text-center group hover:bg-zinc-900/40 transition-all">
                                    <div className="w-12 h-12 border border-zinc-800 rounded-full flex items-center justify-center mx-auto mb-6 text-zinc-600 group-hover:border-red-600/50 group-hover:text-red-600 transition-colors">
                                        <Icon name="User" className="w-5 h-5" />
                                    </div>
                                    <h4 className="text-sm font-black uppercase tracking-[0.2em] mb-2">{driver.name}</h4>
                                    <p className="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">{driver.role}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 border-t border-white/5 bg-black">
                        <div className="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8 text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-600">
                            <div>© 2026 Rovex Racing. No Fame. Pure Passion.</div>
                            <div className="flex gap-8">
                                <a href="#" className="hover:text-white">Imprint</a>
                                <a href="#" className="hover:text-white">Privacy</a>
                                <a href="#" className="flex items-center gap-2 hover:text-white">
                                    <Icon name="ExternalLink" className="w-3 h-3" /> Digital Strategy by RX
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RovexBrandPage />);
    </script>
</body>
</html>
